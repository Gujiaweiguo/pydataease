services:
  pydataease-pg:
    image: postgres:16
    container_name: pydataease-pg-dev
    environment:
      POSTGRES_DB: dataease
      POSTGRES_USER: dataease
      POSTGRES_PASSWORD: dataease
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataease"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
