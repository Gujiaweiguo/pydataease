name: Python Backend CI

on:
  push:
    branches:
      - feat/fastapi-backend-rewrite
      - main
    paths:
      - 'core/pydataease-backend/**'
      - '.github/workflows/python-backend-ci.yml'
  pull_request:
    branches:
      - feat/fastapi-backend-rewrite
      - main
    paths:
      - 'core/pydataease-backend/**'
      - '.github/workflows/python-backend-ci.yml'

concurrency:
  group: python-backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      DE_ENV: dev
      DE_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      DE_SECRET_KEY: ci-secret-key
      DE_SHARE_SECRET_KEY: ci-share-secret-key

    defaults:
      run:
        working-directory: core/pydataease-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run linter
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/ -v --ignore=tests/test_e2e_creation_flow.py
