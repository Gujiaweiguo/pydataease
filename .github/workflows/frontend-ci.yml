name: Frontend CI

on:
  push:
    branches:
      - dev-v2
    paths:
      - 'core/core-frontend/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'core/core-frontend/**'
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run Playwright e2e tests (requires full stack)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: core/core-frontend
        run: npm install --no-audit

      - name: Run TypeScript checks
        working-directory: core/core-frontend
        run: npm run ts:check
        continue-on-error: true  # pre-existing type errors; don't block PR

      - name: Run ESLint
        working-directory: core/core-frontend
        run: npm run lint

      - name: Run stylelint
        working-directory: core/core-frontend
        run: npm run lint:stylelint

      - name: Run unit tests
        working-directory: core/core-frontend
        run: npm run test

      - name: Build check
        working-directory: core/core-frontend
        run: npm run build:base

  # ── Playwright e2e (opt-in: workflow_dispatch or DE_E2E=1) ────
  playwright-e2e:
    if: github.event.inputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DE_ENV: test
      DE_DATABASE_URL: postgresql+asyncpg://dataease:dataease@localhost:5432/dataease
      DE_SECRET_KEY: ci-secret-key
      DE_SHARE_SECRET_KEY: ci-share-secret-key

    defaults:
      run:
        working-directory: core/core-frontend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dataease
          POSTGRES_PASSWORD: dataease
          POSTGRES_DB: dataease
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Admin168
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pAdmin168"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install frontend dependencies
        run: npm install --no-audit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install backend dependencies
        working-directory: core/pydataease-backend
        run: uv sync

      - name: Run migrations
        working-directory: core/pydataease-backend
        run: uv run alembic upgrade head

      - name: Seed demo data
        run: python3 scripts/seed_demo_data.py
        env:
          PGPASSWORD: dataease
          SEED_PG_HOST: 127.0.0.1
          SEED_PG_PORT: '5432'
          SEED_PG_USER: dataease
          SEED_PG_PASS: dataease
          SEED_PG_DB: dataease
          SEED_MYSQL_HOST: 127.0.0.1
          SEED_MYSQL_PORT: '3306'
          SEED_MYSQL_USER: root
          SEED_MYSQL_PASS: Admin168

      - name: Start backend
        working-directory: core/pydataease-backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "  attempt $i/30..."
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "Backend failed to start" && exit 1)

      - name: Start frontend dev server
        run: |
          npm run dev -- --host 0.0.0.0 --port 8080 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Frontend is healthy"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done
          curl -sf http://localhost:8080 || (echo "Frontend failed to start" && exit 1)

      - name: Run Playwright e2e tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: core/core-frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: core/core-frontend/test-results/
          retention-days: 7
