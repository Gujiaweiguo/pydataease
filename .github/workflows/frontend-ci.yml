name: Frontend CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'core/core-frontend/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'core/core-frontend/**'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: core/core-frontend/package-lock.json

      - name: Install dependencies
        working-directory: core/core-frontend
        run: npm ci

      - name: Run TypeScript checks
        working-directory: core/core-frontend
        run: npm run ts:check

      - name: Run ESLint
        working-directory: core/core-frontend
        run: npm run lint

      - name: Run stylelint
        working-directory: core/core-frontend
        run: npm run lint:stylelint
