name: Python Backend CI

on:
  push:
    paths:
      - 'core/pydataease-backend/**'
      - 'core/pydataease-backend/Dockerfile'
      - '.github/workflows/test.yml'
    branches:
      - '**'
  pull_request:
    paths:
      - 'core/pydataease-backend/**'
      - 'core/pydataease-backend/Dockerfile'
      - '.github/workflows/test.yml'
    branches:
      - '**'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DE_ENV: test
      DE_DATABASE_URL: postgresql+asyncpg://dataease:dataease@localhost:5432/dataease
      DE_SECRET_KEY: test-secret-key-for-ci
      DE_SHARE_SECRET_KEY: test-share-secret-key-for-ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dataease
          POSTGRES_PASSWORD: dataease
          POSTGRES_DB: dataease
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: core/pydataease-backend
        run: uv sync

      - name: Run linter
        working-directory: core/pydataease-backend
        run: uv run ruff check .

      - name: Run tests
        working-directory: core/pydataease-backend
        run: >-
          uv run pytest tests/ -v --tb=short -x
          --ignore=tests/test_e2e_creation_flow.py

  docker-build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: core/pydataease-backend
        run: docker build -t pydataease-backend:ci .
