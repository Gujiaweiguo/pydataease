# PyDataEase — Production deployment
# 推荐使用方式：复制 conf/install.env.example 为 conf/install.env，修改后执行 ./install.sh
# 此文件仅用于从项目根目录直接构建启动的开发/测试场景
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Required env vars (set in .env or shell):
#   DE_SECRET_KEY          — JWT signing key (change from default!)
#   DE_SHARE_SECRET_KEY    — Share token signing key (must differ from DE_SECRET_KEY)
#   DE_PG_PASSWORD         — PostgreSQL password (default: dataease)

services:
  pydataease-nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: pydataease-nginx
    restart: unless-stopped
    ports:
      - "${DE_PORT:-8100}:80"
    depends_on:
      pydataease-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  pydataease-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pydataease-app
    restart: unless-stopped
    env_file:
      - core/pydataease-backend/.env
    environment:
      DE_ENV: prod
      DE_DATABASE_URL: postgresql+asyncpg://dataease:${DE_PG_PASSWORD:-dataease}@pydataease-pg:5432/dataease
      DE_SECRET_KEY: ${DE_SECRET_KEY:?DE_SECRET_KEY is required}
      DE_SHARE_SECRET_KEY: ${DE_SHARE_SECRET_KEY:?DE_SHARE_SECRET_KEY is required}
    depends_on:
      pydataease-pg:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - app_logs:/app/logs
      - static_resources:/app/static

  pydataease-pg:
    image: pgvector/pgvector:pg16
    container_name: pydataease-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: dataease
      POSTGRES_USER: dataease
      POSTGRES_PASSWORD: ${DE_PG_PASSWORD:-dataease}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataease"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  app_logs:
  static_resources:
